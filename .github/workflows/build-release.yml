name: Build CigerTool Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_mode:
        description: "plan = sadece plan/staging dogrulama, release = gercek ISO build"
        required: true
        default: "release"
        type: choice
        options:
          - plan
          - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  validate-release-plan:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_mode == 'plan')
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare plan input placeholder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts\logs" | Out-Null
          New-Item -ItemType Directory -Force -Path "inputs\workspace" | Out-Null
          if (-not (Test-Path -LiteralPath "inputs\workspace\install.wim")) {
            New-Item -ItemType File -Force -Path "inputs\workspace\install.wim" | Out-Null
          }
          Set-Content -Path "artifacts\logs\workspace-input.log" -Value "mode=plan`nsource=placeholder`npath=inputs\workspace\install.wim" -Encoding utf8

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build release plan
        shell: powershell
        run: |
          .\build\build_cigertool_release.ps1 -PlanOnly -WorkspaceWimPath "inputs\workspace\install.wim"

      - name: Validate staged outputs
        shell: powershell
        run: |
          $requiredPaths = @(
            "build-output\workspace\manifests\workspace-plan.json",
            "build-output\workspace\manifests\CigerToolWorkspace.Unattend.xml",
            "build-output\workspace\usb-layout\CigerTool.workspace.json",
            "build-output\workspace\usb-layout\EFI\CigerTool\grub.cfg",
            "build-output\workspace\usb-layout\EFI\CigerTool\boot-manifest.json",
            "build-output\workspace\workspace-stage\Program Files\CigerToolWorkspace\startup\Start-CigerToolWorkspace.ps1",
            "build-output\workspace\workspace-stage\Program Files\CigerToolWorkspace\startup\CigerToolWorkspace.Runtime.ps1",
            "build-output\workspace\usb-layout\isos\windows",
            "build-output\workspace\usb-layout\isos\linux",
            "build-output\workspace\usb-layout\isos\tools"
          )
          foreach ($path in $requiredPaths) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Release plan dogrulama hatasi. Eksik yol: $path"
            }
          }

      - name: Upload staged release plan
        uses: actions/upload-artifact@v4
        with:
          name: cigertool-release-plan
          path: build-output/workspace
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cigertool-build-logs
          path: artifacts/logs
          if-no-files-found: warn
          retention-days: 30

  build-release-iso:
    if: github.event_name == 'workflow_dispatch' && inputs.build_mode == 'release'
    runs-on:
      - self-hosted
      - Windows
      - X64
    timeout-minutes: 180
    env:
      SELF_HOSTED_REPO_ROOT: C:\actions-runner\cigertool-release\repo
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Prepare local release repository
        id: local_repo
        shell: powershell
        run: |
          $repoRoot = $env:SELF_HOSTED_REPO_ROOT
          $repoParent = Split-Path -Path $repoRoot -Parent
          New-Item -ItemType Directory -Force -Path $repoParent | Out-Null

          $remoteUrl = "https://x-access-token:$env:GITHUB_TOKEN@github.com/$env:GITHUB_REPOSITORY.git"

          if (-not (Test-Path -LiteralPath (Join-Path $repoRoot ".git"))) {
            git clone $remoteUrl $repoRoot
          } else {
            git -C $repoRoot remote set-url origin $remoteUrl
          }

          git -C $repoRoot fetch --prune origin
          git -C $repoRoot checkout --force $env:GITHUB_SHA
          git -C $repoRoot reset --hard $env:GITHUB_SHA

          "repo_root=$repoRoot" >> $env:GITHUB_OUTPUT
          Write-Host "Release repo root: $repoRoot"

      - name: Validate local workspace input
        shell: powershell
        run: |
          $repoRoot = "${{ steps.local_repo.outputs.repo_root }}"
          $workspaceWim = Join-Path $repoRoot "inputs\workspace\install.wim"
          $logRoot = Join-Path $repoRoot "artifacts\logs"
          New-Item -ItemType Directory -Force -Path $logRoot | Out-Null
          if (-not (Test-Path -LiteralPath $workspaceWim)) {
            throw "Release mode icin gereken yerel girdi bulunamadi: $workspaceWim"
          }
          Get-Item $workspaceWim | Format-List FullName,Length,LastWriteTime
          Set-Content -Path (Join-Path $logRoot "workspace-input.log") -Value "mode=release`nsource=persistent-local-repo`npath=$workspaceWim" -Encoding utf8

      - name: Validate local Python
        shell: powershell
        run: |
          $pythonCmd = Get-Command python -ErrorAction SilentlyContinue
          if (-not $pythonCmd) {
            throw "Self-hosted release runner uzerinde python bulunamadi. Python 3.12+ kurun ve PATH'e ekleyin."
          }
          $pythonVersion = & python -c "import sys; print('.'.join(map(str, sys.version_info[:3])))"
          if ([version]$pythonVersion -lt [version]"3.12.0") {
            throw "Self-hosted release runner uzerindeki Python surumu yetersiz: $pythonVersion. Python 3.12+ gerekir."
          }
          Write-Host "Python surumu: $pythonVersion"

      - name: Install Python dependencies
        shell: powershell
        working-directory: ${{ steps.local_repo.outputs.repo_root }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build release ISO
        shell: powershell
        working-directory: ${{ steps.local_repo.outputs.repo_root }}
        run: |
          .\build\build_cigertool_release.ps1 -WorkspaceWimPath "inputs\workspace\install.wim"

      - name: Validate release artifacts
        shell: powershell
        working-directory: ${{ steps.local_repo.outputs.repo_root }}
        run: |
          $requiredPaths = @(
            "artifacts\CigerTool-Workspace.iso",
            "artifacts\CigerTool-Workspace.iso.sha256",
            "artifacts\CigerTool-Workspace.release.json",
            "artifacts\CigerTool-Workspace-debug.zip"
          )
          foreach ($path in $requiredPaths) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Release artifact eksik: $path"
            }
          }
          Get-Item "artifacts\CigerTool-Workspace.iso" | Format-List Name,Length,LastWriteTime

      - name: Upload release ISO
        uses: actions/upload-artifact@v4
        with:
          name: CigerTool-Workspace
          path: |
            ${{ steps.local_repo.outputs.repo_root }}\artifacts\CigerTool-Workspace.iso
            ${{ steps.local_repo.outputs.repo_root }}\artifacts\CigerTool-Workspace.iso.sha256
            ${{ steps.local_repo.outputs.repo_root }}\artifacts\CigerTool-Workspace.release.json
            ${{ steps.local_repo.outputs.repo_root }}\artifacts\CigerTool-Workspace-debug.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cigertool-build-logs
          path: ${{ steps.local_repo.outputs.repo_root }}\artifacts\logs
          if-no-files-found: warn
          retention-days: 30
