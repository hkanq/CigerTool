name: Build CigerTool Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_mode:
        description: "plan = sadece plan/staging dogrulama, release = gercek ISO build"
        required: true
        default: "release"
        type: choice
        options:
          - plan
          - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  validate-release-plan:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_mode == 'plan')
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare plan input placeholder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts\logs" | Out-Null
          New-Item -ItemType Directory -Force -Path "inputs\workspace" | Out-Null
          if (-not (Test-Path -LiteralPath "inputs\workspace\install.wim")) {
            New-Item -ItemType File -Force -Path "inputs\workspace\install.wim" | Out-Null
          }
          Set-Content -Path "artifacts\logs\workspace-input.log" -Value "mode=plan`nsource=placeholder`npath=inputs\workspace\install.wim" -Encoding utf8

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build release plan
        shell: powershell
        run: |
          .\build\build_cigertool_release.ps1 -PlanOnly -WorkspaceWimPath "inputs\workspace\install.wim"

      - name: Validate staged outputs
        shell: powershell
        run: |
          $requiredPaths = @(
            "build-output\workspace\manifests\release-plan.json",
            "build-output\workspace\manifests\CigerTool.Unattend.xml",
            "build-output\workspace\manifests\startup\Start-CigerToolWorkspace.ps1",
            "build-output\workspace\media-root\bootmgr",
            "build-output\workspace\media-root\boot\BCD",
            "build-output\workspace\media-root\boot\boot.sdi",
            "build-output\workspace\media-root\boot\etfsboot.com",
            "build-output\workspace\media-root\efi\boot\bootx64.efi",
            "build-output\workspace\media-root\efi\microsoft\boot\BCD",
            "build-output\workspace\media-root\efi\microsoft\boot\efisys.bin",
            "build-output\workspace\media-root\sources"
          )
          foreach ($path in $requiredPaths) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Release plan dogrulama hatasi. Eksik yol: $path"
            }
          }

      - name: Upload staged release plan
        uses: actions/upload-artifact@v4
        with:
          name: cigertool-release-plan
          path: build-output/workspace
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cigertool-build-logs
          path: artifacts/logs
          if-no-files-found: warn
          retention-days: 30

  build-release-iso:
    if: github.event_name == 'workflow_dispatch' && inputs.build_mode == 'release'
    runs-on:
      - self-hosted
      - Windows
      - X64
    timeout-minutes: 180
    env:
      SELF_HOSTED_REPO_ROOT: C:\actions-runner\cigertool-release\repo
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Prepare local release repository
        shell: cmd
        run: |
          @echo off
          set "REPO_ROOT=%SELF_HOSTED_REPO_ROOT%"
          set "REPO_PARENT=%REPO_ROOT%\.."
          if not exist "%REPO_PARENT%" mkdir "%REPO_PARENT%"
          set "REMOTE_URL=https://x-access-token:%GITHUB_TOKEN%@github.com/%GITHUB_REPOSITORY%.git"
          git config --global --add safe.directory "%REPO_ROOT%"

          if not exist "%REPO_ROOT%\.git" (
            git clone "%REMOTE_URL%" "%REPO_ROOT%"
          ) else (
            git -C "%REPO_ROOT%" remote set-url origin "%REMOTE_URL%"
          )

          git -C "%REPO_ROOT%" fetch --prune origin
          git -C "%REPO_ROOT%" checkout --force "%GITHUB_SHA%"
          git -C "%REPO_ROOT%" reset --hard "%GITHUB_SHA%"
          echo Release repo root: %REPO_ROOT%

      - name: Validate local workspace input
        shell: cmd
        run: |
          @echo off
          set "REPO_ROOT=%SELF_HOSTED_REPO_ROOT%"
          set "WORKSPACE_WIM=%REPO_ROOT%\inputs\workspace\install.wim"
          set "LOG_ROOT=%REPO_ROOT%\artifacts\logs"
          if not exist "%LOG_ROOT%" mkdir "%LOG_ROOT%"
          if not exist "%WORKSPACE_WIM%" (
            echo Release mode icin gereken yerel girdi bulunamadi: %WORKSPACE_WIM%
            exit /b 1
          )
          (
            echo mode=release
            echo source=persistent-local-repo
            echo path=%WORKSPACE_WIM%
          ) > "%LOG_ROOT%\workspace-input.log"
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "Get-Item -LiteralPath '%WORKSPACE_WIM%' | Format-List FullName,Length,LastWriteTime"

      - name: Validate local Python
        shell: cmd
        run: |
          @echo off
          where python >nul 2>nul || (
            echo Self-hosted release runner uzerinde python bulunamadi. Python 3.12+ kurun ve PATH'e ekleyin.
            exit /b 1
          )
          for /f %%i in ('python -c "import sys; print('.'.join(map(str, sys.version_info[:3])))"') do set "PYTHON_VERSION=%%i"
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "$v=[version]'%PYTHON_VERSION%'; if ($v -lt [version]'3.12.0') { throw 'Self-hosted release runner uzerindeki Python surumu yetersiz: %PYTHON_VERSION%. Python 3.12+ gerekir.' }"
          echo Python surumu: %PYTHON_VERSION%

      - name: Validate runner elevation
        shell: cmd
        run: |
          @echo off
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "$identity=[Security.Principal.WindowsIdentity]::GetCurrent(); $principal=New-Object Security.Principal.WindowsPrincipal($identity); if (-not $principal.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)) { throw ('Self-hosted release runner admin yetkisi ile calismiyor. Mevcut kimlik: ' + $identity.Name + '. GitHub Actions runner servisini yerel administrator hesabi ile calistirin veya run.cmd dosyasini yukseltilmis terminalde baslatin.') } ; Write-Host ('Runner admin dogrulandi: ' + $identity.Name)"

      - name: Install Python dependencies
        shell: cmd
        working-directory: ${{ env.SELF_HOSTED_REPO_ROOT }}
        run: |
          @echo off
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build release ISO
        shell: cmd
        working-directory: ${{ env.SELF_HOSTED_REPO_ROOT }}
        run: |
          @echo off
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File ".\build\build_cigertool_release.ps1" -WorkspaceWimPath "inputs\workspace\install.wim"

      - name: Validate release artifacts
        shell: cmd
        working-directory: ${{ env.SELF_HOSTED_REPO_ROOT }}
        run: |
          @echo off
          if not exist "artifacts\CigerTool.iso" (
            echo Release artifact eksik: artifacts\CigerTool.iso
            exit /b 1
          )
          if not exist "artifacts\CigerTool.iso.sha256" (
            echo Release artifact eksik: artifacts\CigerTool.iso.sha256
            exit /b 1
          )
          if not exist "artifacts\CigerTool.release.json" (
            echo Release artifact eksik: artifacts\CigerTool.release.json
            exit /b 1
          )
          if not exist "artifacts\CigerTool-debug.zip" (
            echo Release artifact eksik: artifacts\CigerTool-debug.zip
            exit /b 1
          )
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "Get-Item -LiteralPath 'artifacts\CigerTool.iso' | Format-List Name,Length,LastWriteTime"

      - name: Upload release ISO
        uses: actions/upload-artifact@v4
        with:
          name: CigerTool
          path: |
            ${{ env.SELF_HOSTED_REPO_ROOT }}\artifacts\CigerTool.iso
            ${{ env.SELF_HOSTED_REPO_ROOT }}\artifacts\CigerTool.iso.sha256
            ${{ env.SELF_HOSTED_REPO_ROOT }}\artifacts\CigerTool.release.json
            ${{ env.SELF_HOSTED_REPO_ROOT }}\artifacts\CigerTool-debug.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cigertool-build-logs
          path: ${{ env.SELF_HOSTED_REPO_ROOT }}\artifacts\logs
          if-no-files-found: warn
          retention-days: 30
